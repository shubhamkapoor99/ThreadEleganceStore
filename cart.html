<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart — ThreadElegance Store</title>
  <meta name="description" content="Review your selected sarees and place your order on WhatsApp." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Warm up the Google Drive image hosts early so saree photos start loading sooner -->
  <link rel="preconnect" href="https://lh3.googleusercontent.com" crossorigin>
  <link rel="preconnect" href="https://drive.google.com" crossorigin>
  <link rel="dns-prefetch" href="https://lh3.googleusercontent.com">
  <link rel="dns-prefetch" href="https://drive.google.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,600&family=Poppins:wght@300;400;500;600&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,600&family=Poppins:wght@300;400;500;600&display=swap"></noscript>
  <link rel="stylesheet" href="css/styles.css?v=20260631" />
</head>
<body>
  <div class="loader"><div class="ring"></div></div>
  <header data-chrome="header"></header>

  <section class="page-hero" style="padding:140px 0 50px">
    <div class="container">
      <h1>Your Cart</h1>
      <p>Review your selection, add your details, and place the order on WhatsApp.</p>
      <p class="cart-availability-note"><em>Please note: all sarees are subject to availability.</em></p>
    </div>
  </section>

  <section class="section" style="padding-top:50px">
    <div class="container">
      <div class="cart-wrap">
        <div id="cart-items"></div>
        <div id="cart-summary"></div>
      </div>
    </div>
  </section>

  <!-- ===== Gallery modal ===== -->
  <div class="modal" id="gallery-modal">
    <div class="modal-bg"></div>
    <div class="modal-card">
      <button class="modal-close" data-mclose>&times;</button>
      <div class="modal-gallery">
        <div class="mg-stage">
          <button class="mg-arrow prev" aria-label="Previous">‹</button>
          <img data-mstage src="" alt="Saree image">
          <button class="mg-arrow next" aria-label="Next">›</button>
        </div>
        <div class="mg-thumbs" data-mthumbs></div>
      </div>
      <div class="modal-info">
        <h2 data-mtitle>Saree</h2>
        <p class="m-type" data-mtype></p>
        <p class="m-details" data-mdetails></p>
        <div class="m-price gold-text" data-mprice></div>
        <div class="m-buy">
          <button class="btn btn-outline" data-mbuy style="justify-content:center">Buy Now</button>
          <button class="btn btn-primary" data-madd style="justify-content:center">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer" data-chrome="footer"></footer>

  <script src="js/config.js"></script>
  <script src="js/drive.js"></script>
  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script>renderChrome("cart.html");</script>
  <script src="js/gallery.js?v=20260631"></script>
  <script src="js/cart.js"></script>
</body>
</html>
