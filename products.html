<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Sarees — ThreadElegance Store</title>
  <meta name="description" content="Browse our full collection of handwoven sarees. Filter by colour and find your perfect drape." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,600&family=Poppins:wght@300;400;500;600&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,600&family=Poppins:wght@300;400;500;600&display=swap"></noscript>
  <link rel="stylesheet" href="css/styles.css?v=20260614" />
</head>
<body>
  <div class="loader"><div class="ring"></div></div>
  <header data-chrome="header"></header>

  <section class="page-hero">
    <div class="container">
      <h1>The Saree Collection</h1>
      <p>Each weave tells a story. Filter by colour and explore every drape — swipe through detailed galleries before you order.</p>
    </div>
  </section>

  <section class="section" style="padding-top:60px">
    <div class="container">
      <div class="products-layout">
        <!-- sarees (left) -->
        <div class="products-main">
          <p id="result-count" class="muted" style="margin-bottom:18px"></p>
          <div id="product-grid" class="product-grid"></div>
        </div>

        <!-- filter box (right) -->
        <aside class="filter-sidebar reveal">
          <div class="filters">
            <div class="filters-head">
              <span class="filter-box-title">Filter &amp; Sort</span>
              <button type="button" class="filter-toggle" id="filter-toggle" aria-expanded="false" aria-controls="filter-menu">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M3 5h18M6 12h12M10 19h4"/>
                </svg>
                <span>Filter</span>
                <svg class="ft-chevron" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M6 9l6 6 6-6"/>
                </svg>
              </button>
              <div class="filter-active" id="filter-active" aria-live="polite"></div>
              <label class="sort-field">
                <span class="sort-label">Sort by</span>
                <select id="sort-select" aria-label="Sort">
                  <option value="">Featured</option>
                  <option value="low">Price: Low–High</option>
                  <option value="high">Price: High–Low</option>
                  <option value="name">Name: A–Z</option>
                </select>
              </label>
            </div>

            <div class="filter-menu" id="filter-menu" hidden>
              <div class="filter-group" id="occasion-group">
                <button type="button" class="filter-group-head" aria-expanded="false">
                  <span class="fg-label">Shop By Occasion</span>
                  <span class="fg-current" id="occasion-current">All</span>
                  <svg class="fg-chevron" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
                </button>
                <div class="filter-group-body">
                  <div id="occasion-filter" class="color-chips" role="group" aria-label="Filter sarees by occasion"></div>
                </div>
              </div>

              <div class="filter-group" id="color-group">
                <button type="button" class="filter-group-head" aria-expanded="false">
                  <span class="fg-label">Colour</span>
                  <span class="fg-current" id="color-current">All</span>
                  <svg class="fg-chevron" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
                </button>
                <div class="filter-group-body">
                  <div id="color-filter" class="color-chips" role="group" aria-label="Filter sarees by colour"></div>
                </div>
              </div>

              <div class="filter-group" id="type-group">
                <button type="button" class="filter-group-head" aria-expanded="false">
                  <span class="fg-label">Saree Cloth</span>
                  <span class="fg-current" id="type-current">All</span>
                  <svg class="fg-chevron" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
                </button>
                <div class="filter-group-body">
                  <div id="type-filter" class="color-chips" role="group" aria-label="Filter sarees by cloth"></div>
                </div>
              </div>

              <div class="filter-group" id="price-row" hidden>
                <button type="button" class="filter-group-head" aria-expanded="false">
                  <span class="fg-label">Price Range</span>
                  <span class="fg-current" id="price-current">All</span>
                  <svg class="fg-chevron" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
                </button>
                <div class="filter-group-body">
                  <div id="price-filter" class="price-filter"></div>
                </div>
              </div>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </section>

  <!-- ===== Gallery modal ===== -->
  <div class="modal" id="gallery-modal">
    <div class="modal-bg"></div>
    <div class="modal-card">
      <button class="modal-close" data-mclose>&times;</button>
      <div class="modal-gallery">
        <div class="mg-stage">
          <button class="mg-arrow prev" aria-label="Previous">‹</button>
          <img data-mstage src="" alt="Saree image">
          <button class="mg-arrow next" aria-label="Next">›</button>
        </div>
        <div class="mg-thumbs" data-mthumbs></div>
      </div>
      <div class="modal-info">
        <h2 data-mtitle>Saree</h2>
        <p class="m-type" data-mtype></p>
        <p class="m-details" data-mdetails></p>
        <div class="m-price gold-text" data-mprice></div>
        <div class="m-buy">
          <div class="qty" data-mqty>
            <button type="button" data-mstep="-1">−</button>
            <input type="number" min="1" value="1" data-mqtyinput aria-label="Quantity">
            <button type="button" data-mstep="1">+</button>
          </div>
          <button class="btn btn-gold" data-madd style="justify-content:center">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer" data-chrome="footer"></footer>

  <script src="js/config.js"></script>
  <script src="js/drive.js"></script>
  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script>renderChrome("products.html");</script>
  <script src="js/gallery.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
