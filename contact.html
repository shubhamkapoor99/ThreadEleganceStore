<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — ThreadElegance Store</title>
  <meta name="description" content="Reach ThreadElegance Store on WhatsApp, email, or phone, or visit us in Chandni Chowk, Delhi." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,600&family=Poppins:wght@300;400;500;600&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,600&family=Poppins:wght@300;400;500;600&display=swap"></noscript>
  <link rel="stylesheet" href="css/styles.css?v=20260718" />
</head>
<body>
  <div class="loader"><div class="ring"></div></div>
  <header data-chrome="header"></header>

  <section class="page-hero">
    <div class="container">
      <h1>Get In Touch</h1>
      <p>Have a question or want to place an order? We're a message away.</p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="contact-cards">
        <a class="contact-card reveal" id="wa-card" target="_blank">
          <div class="ic">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor" aria-hidden="true">
              <path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.7 4.8-1.3A10 10 0 1 0 12 2zm0 18a8 8 0 0 1-4.1-1.1l-.3-.2-2.8.8.8-2.8-.2-.3A8 8 0 1 1 12 20zm4.5-5.9c-.2-.1-1.4-.7-1.7-.8-.2-.1-.4-.1-.5.1l-.7.9c-.1.2-.3.2-.5.1a6.5 6.5 0 0 1-3.2-2.8c-.1-.2 0-.4.1-.5l.4-.5c.1-.1.1-.3.2-.4 0-.1 0-.3 0-.4l-.7-1.7c-.2-.4-.4-.4-.5-.4h-.5c-.2 0-.4.1-.6.3-.2.2-.8.8-.8 1.9s.8 2.2.9 2.4c.1.1 1.6 2.5 4 3.5.6.3 1 .4 1.4.5.6.2 1.1.2 1.5.1.5-.1 1.4-.6 1.6-1.1.2-.6.2-1 .1-1.1z"/>
            </svg>
          </div>
          <h4 style="color:var(--wine);margin-bottom:6px">WhatsApp</h4>
          <p class="muted">Chat with us instantly</p>
        </a>
        <a class="contact-card reveal d1" id="mail-card">
          <div class="ic">✉</div>
          <h4 style="color:var(--wine);margin-bottom:6px">Email</h4>
          <p class="muted" id="mail-text"></p>
        </a>
        <a class="contact-card reveal d2" id="call-card">
          <div class="ic">☎</div>
          <h4 style="color:var(--wine);margin-bottom:6px">Call Us</h4>
          <p class="muted" id="call-text"></p>
        </a>
        <a class="contact-card reveal d3" id="insta-card" target="_blank" rel="noopener">
          <div class="ic">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <rect x="3" y="3" width="18" height="18" rx="5"/>
              <circle cx="12" cy="12" r="4"/>
              <circle cx="17.4" cy="6.6" r="1.1" fill="currentColor" stroke="none"/>
            </svg>
          </div>
          <h4 style="color:var(--wine);margin-bottom:6px">Instagram</h4>
          <p class="muted">Follow our latest drapes</p>
        </a>
      </div>

      <div class="reveal" style="margin-top:46px;text-align:center;background:#fff;border:1px solid #efe6da;border-radius:var(--radius);padding:40px;box-shadow:var(--shadow-sm)">
        <h2 style="color:var(--wine);font-size:1.6rem;margin-bottom:10px">Visit Our Store</h2>
        <p class="muted"><a href="https://maps.app.goo.gl/ssD4s1cZA2HSo72E9" target="_blank" rel="noopener">846-A, Katra Mahesh Das, Nai Sarak, Chandni Chowk, Delhi, India</a></p>
        <div style="margin-top:24px;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm)">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3501.1491026063413!2d77.2250903737537!3d28.6552538830516!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390cfdc2f7de694b%3A0xa9d851ee19fac07b!2sGarhwal%20Creations!5e0!3m2!1sen!2sin!4v1780371293867!5m2!1sen!2sin"
            width="100%" height="380" style="border:0;display:block" allowfullscreen=""
            loading="lazy" referrerpolicy="no-referrer-when-downgrade"
            title="ThreadElegance Store location"></iframe>
        </div>
      </div>
    </div>
  </section>

  <footer class="site-footer" data-chrome="footer"></footer>

  <script src="js/config.js"></script>
  <script src="js/drive.js"></script>
  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script>
    renderChrome("contact.html");
    const c = window.STORE_CONFIG;
    document.getElementById("wa-card").href = `https://wa.me/${c.whatsappNumber}`;
    const mail = document.getElementById("mail-card");
    mail.href = `mailto:${c.email}`;
    // Allow a clean line break before "@" (name on one line, @domain on the next)
    // instead of an ugly mid-word split like "...@g / mail.com".
    const safeEmail = c.email.replace(/[&<>"]/g, (ch) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[ch]));
    document.getElementById("mail-text").innerHTML = safeEmail.replace("@", "<wbr>@");
    const call = document.getElementById("call-card");
    call.href = `tel:${c.phone}`; document.getElementById("call-text").textContent = c.phone;
    const insta = document.getElementById("insta-card");
    if (c.instagram) insta.href = c.instagram; else insta.style.display = "none";
  </script>
</body>
</html>
